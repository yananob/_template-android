name: Android Build & Upload (release)
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: XXX-build-release
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # ここでキャッシュ効かせるのがクリーンな鉄則！

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew
        
      # - name: Build apk with Gradle
      #   run: >
      #     ./gradlew assembleRelease
      #     -Pandroid.injected.signing.store.file=$(pwd)/release.jks
      #     -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
      #     -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
      #     -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
      # - id: 'upload-apk'
      #   uses: actions/upload-artifact@v6
      #   with:
      #     name: app-apk-release
      #     path: app/build/outputs/apk/release/*.apk # 保存したいファイルのパス
      #     retention-days: 3 # 何日間保存するか（デフォルトは90日やけど、自分用なら短くてOK）

      # AABのビルド実行
      - name: Build aab with Gradle
        run: ./gradlew bundleRelease

     # AABのビルド後にこれを追加
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        
      # ビルドしたAABをArtifactとして保存（後でダウンロードできる）
      - id: 'upload-aab'
        name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-aab-release
          path: app/build/outputs/bundle/release/*.aab

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apkUrl = "${{ steps.upload-apk.outputs.artifact-url }}";
            const aabUrl = "${{ steps.upload-aab.outputs.artifact-url }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📦 Build Artifacts (Release)\n\n- [app-apk-release](${apkUrl})\n- [app-aab-release](${aabUrl})`
            })
          
